# TERM inside tmux panes (outside tmux: xterm-256color from WezTerm).
set-option -g default-terminal "tmux-256color"
set-window-option -g xterm-keys on

# Prefix Ctrl+a:
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# Easy config reload:
bind-key r source-file ~/.tmux.conf \; display-message "Configuration reloaded."

# Lengthen the amount of time status messages are displayed:
set-option -g display-time 1000
set-option -g display-panes-time 1000

# Counting starts from 1:
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Windows options:
set-window-option -g automatic-rename on
set-option -g renumber-windows on
set-option -g set-titles on

# Home/End in copy mode.
unbind-key -T copy-mode-vi 'Home'
unbind-key -T copy-mode-vi 'End'
bind-key -T copy-mode-vi 'Home' send -X start-of-line
bind-key -T copy-mode-vi 'End' send -X end-of-line

# Move around CMD line with 'h' 'j' 'k' 'l':
set-option -g status-keys vi

# Vi mode for buffer navigation:
# Ctrl+A [ - Start copy mode
# Ctrl+A ] - Paste selected text
set-window-option -g mode-keys vi

# Copy like in VIM:
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Paste like in VIM:
unbind-key p
bind-key p paste-buffer
bind-key P choose-buffer

# Do not visually notify when window has some activity:
set-window-option -g monitor-activity on
set-option -g visual-activity off

# Splits:
bind-key v split-window -h
bind-key h split-window -v

# Time the prefix-key is active:
set-option -g repeat-time 0

# Time to wait for escape sequence:
set-option -g escape-time 10

# Pane resizing (-r = may repeat):
bind-key -r H resize-pane -L 15
bind-key -r J resize-pane -D 15
bind-key -r K resize-pane -U 15
bind-key -r L resize-pane -R 15

# Use Ctrl+arrow keys without prefix key to switch panes:
bind-key -n C-Left select-pane -L
bind-key -n C-Right select-pane -R
bind-key -n C-Up select-pane -U
bind-key -n C-Down select-pane -D

# Shift+arrow to switch windows:
bind-key -n S-Left  previous-window
bind-key -n S-Right next-window

# Mouse Mode:
set-option -g mouse on

# Paste to tmux from external:
set-option -g set-clipboard on

# Scroll buffer:
set-option -g history-limit 10000

# Easy clear history (scrollable histroy):
bind-key -n C-k clear-history

# Status Bar:
set-option -g status-justify centre
set-option -g status-interval 30

# Gruvbox Dark Theme:
set -g status-style fg=#ebdbb2,bg=#3c3836

set -g status-left-style fg=#282828,bg=#b8bb26
set -g status-left ' #S '

set -g status-right-style fg=#ebdbb2,bg=#3c3836
set -g status-right '#H | %Y-%m-%d %H:%M '

setw -g window-status-style fg=#928374,bg=#3c3836
setw -g window-status-current-style fg=#282828,bg=#fabd2f,bold

set -g pane-border-style fg=#504945
set -g pane-active-border-style fg=#b8bb26

set -g message-style fg=#282828,bg=#fabd2f
set -g mode-style fg=#282828,bg=#83a598
